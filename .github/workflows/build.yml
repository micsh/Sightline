name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        dotnet-quality: 'preview'

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install parsers
      run: cd src/CodeSight/parsers && npm install --legacy-peer-deps

    - name: Restore
      run: dotnet restore AITeam.Sight.slnx

    - name: Build
      run: dotnet build AITeam.Sight.slnx --no-restore -c Release
