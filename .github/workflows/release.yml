name: Release

on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
          - os: windows-latest
            rid: win-x64
          - os: macos-latest
            rid: osx-arm64

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        dotnet-quality: 'preview'

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install parsers
      run: cd src/CodeSight/parsers && npm install --legacy-peer-deps

    - name: Publish CodeSight
      run: dotnet publish src/CodeSight/AITeam.CodeSight.fsproj -c Release -r ${{ matrix.rid }} -o publish-cs

    - name: Publish KnowledgeSight
      run: dotnet publish src/KnowledgeSight/AITeam.KnowledgeSight.fsproj -c Release -r ${{ matrix.rid }} -o publish-ks

    - name: Archive (Linux/macOS)
      if: runner.os != 'Windows'
      run: |
        tar -czf code-sight-${{ matrix.rid }}.tar.gz -C publish-cs .
        tar -czf knowledge-sight-${{ matrix.rid }}.tar.gz -C publish-ks .

    - name: Archive (Windows)
      if: runner.os == 'Windows'
      run: |
        Compress-Archive -Path publish-cs\* -DestinationPath code-sight-${{ matrix.rid }}.zip
        Compress-Archive -Path publish-ks\* -DestinationPath knowledge-sight-${{ matrix.rid }}.zip

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: release-${{ matrix.rid }}
        path: |
          code-sight-*
          knowledge-sight-*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        merge-multiple: true

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: artifacts/*
